name: CI

on:
  push:
    branches:
      - prod

  pull_request:
    branches:
      - prod

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Required for static SEO routes (sitemap, manifest, metadata) at build time
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build
